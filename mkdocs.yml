site_name: MapVina Style Spec
site_url: https://www.mapvina.com/mapvina-style-spec/
repo_url: https://github.com/mapvina/mapvina-style-spec
site_description: Documentation for the MapVina Style Specification
extra_css:
  - assets/extra.css
theme:
  name: 'material'
  favicon: https://mapvina.com/favicon.ico
  logo: assets/logo.svg
  features:
    - content.code.copy
    - toc.follow
    - search.suggest
    - navigation.instant
    - navigation.sections
    - navigation.top  # back to top button
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
markdown_extensions:
  - toc:
      toc_depth: 3
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.escapeall:
      hardbreak: True
      nbsp: True
extra:
  social:
    - icon: fontawesome/brands/mastodon
      link: https://mastodon.social/@mapvina
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/mapvina
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/mapvina
    - icon: fontawesome/brands/slack
      link: https://osmus.slack.com/archives/C01G3D28DAB
    - icon: fontawesome/brands/github
      link: https://github.com/mapvina
plugins:
  - search
  - social:
      cards_layout_options:
        background_color: '#295DAA'
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
